<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tricolor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0722E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8851E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B8B8B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1A1816; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #FAF8F5; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="18"/>
  <text fill="url(#tricolor)" x="50" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="82" font-weight="400" text-anchor="middle">&amp;</text>
</svg>
